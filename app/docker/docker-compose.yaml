version: "3.8"

services:
  icloud-sync:
    image: python:3.12-slim
    container_name: fnos-icloud-sync
    restart: unless-stopped
    working_dir: /opt/icloud-sync
    command:
      - /bin/sh
      - -c
      - |
        set -e
        mkdir -p /config /data /logs
        if [ ! -x /config/venv/bin/python ] || [ ! -f /config/venv/.icloud-sync-0.2.1 ]; then
          python -m venv /config/venv
          /config/venv/bin/pip install --no-cache-dir --upgrade pip
          /config/venv/bin/pip install --no-cache-dir -r /opt/icloud-sync/requirements.txt
          touch /config/venv/.icloud-sync-0.2.1
        fi
        exec /config/venv/bin/python /opt/icloud-sync/server.py
    environment:
      APP_HOST: "0.0.0.0"
      APP_PORT: "8080"
      APP_CONFIG_DIR: "/config"
      APP_DATA_DIR: "/data"
      APP_LOG_DIR: "/logs"
      TZ: "Asia/Shanghai"
      PYTHONUNBUFFERED: "1"
    ports:
      - "${TRIM_SERVICE_PORT}:8080"
    volumes:
      - "${TRIM_APPDEST}/server:/opt/icloud-sync:ro"
      - "${TRIM_PKGVAR}/config:/config"
      - "${TRIM_PKGVAR}/logs:/logs"
      - "/var/apps/icloud-sync/shares/icloud:/data"
